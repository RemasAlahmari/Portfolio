<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuneFinder 🎵</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"/>
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #13131a;
      --card:    #1c1c28;
      --border:  #2a2a3d;
      --accent:  #a855f7;
      --accent2: #ec4899;
      --green:   #22c55e;
      --text:    #f1f0ff;
      --muted:   #7070a0;
      --glow:    0 0 40px rgba(168,85,247,0.25);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-link:hover { color: var(--text); border-color: var(--accent); }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* Header */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .hero .badge {
      display: inline-block;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 50px;
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, #f1f0ff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    /* Search box */
    .search-box {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search-input-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1rem 0.9rem 3rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.9rem 1.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(168,85,247,0.3);
    }

    .btn-search:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(168,85,247,0.45);
    }

    .btn-search:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Filter row */
    .filter-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      align-items: center;
    }

    .filter-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; margin-right: 0.25rem; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.35rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: rgba(168,85,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Status messages */
    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .status .status-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .status p { font-size: 1rem; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: #f87171;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* Results header */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .results-count {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .results-count span { color: var(--accent); }

    /* Track grid */
    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* Track card */
    .track-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      cursor: default;
    }

    .track-card:hover {
      transform: translateY(-4px);
      border-color: rgba(168,85,247,0.4);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), var(--glow);
    }

    .track-art-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface);
    }

    .track-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .track-card:hover .track-art { transform: scale(1.05); }

    .art-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,0.8) 0%, transparent 50%);
    }

    .play-btn {
      position: absolute;
      bottom: 0.75rem;
      right: 0.75rem;
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 16px rgba(168,85,247,0.5);
    }

    .play-btn:hover { transform: scale(1.1); background: var(--accent2); }
    .play-btn svg { color: white; margin-left: 2px; }
    .play-btn.playing svg.play-icon { display: none; }
    .play-btn.playing svg.stop-icon { display: block !important; }

    .track-body {
      padding: 1rem;
      flex: 1;
    }

    .track-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }

    .track-artist {
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-album {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
    }

    .genre-tag {
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--accent);
      border-radius: 50px;
      padding: 0.2rem 0.6rem;
    }

    .itunes-link {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .itunes-link:hover { color: var(--accent); }

    /* Quick search suggestions */
    .suggestions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: rgba(168,85,247,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <a href="myworks.html" class="back-link">← My Works</a>

  <div class="container">

    <div class="hero">
      <div class="badge">🎵 Powered by iTunes API</div>
      <h1>TuneFinder</h1>
      <p>Search millions of songs, albums & artists — listen to previews instantly</p>
    </div>

    <!-- Search -->
    <div class="search-box">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search for a song, artist, or album…"
          onkeydown="if(event.key==='Enter') doSearch()"
        />
      </div>
      <button class="btn-search" id="search-btn" onclick="doSearch()">Search 🎶</button>
    </div>

    <!-- Filter -->
    <div class="filter-row">
      <span class="filter-label">Type:</span>
      <button class="filter-btn active" onclick="setFilter('music', this)">🎵 Songs</button>
      <button class="filter-btn" onclick="setFilter('musicArtist', this)">🎤 Artists</button>
      <button class="filter-btn" onclick="setFilter('album', this)">💿 Albums</button>
    </div>

    <!-- Quick suggestions -->
    <div class="suggestions" id="suggestions">
      <span style="font-size:0.82rem;color:var(--muted);font-weight:600;align-self:center;">Try:</span>
      <button class="suggestion-chip" onclick="quickSearch('Taylor Swift')">Taylor Swift</button>
      <button class="suggestion-chip" onclick="quickSearch('The Weeknd')">The Weeknd</button>
      <button class="suggestion-chip" onclick="quickSearch('Billie Eilish')">Billie Eilish</button>
      <button class="suggestion-chip" onclick="quickSearch('BTS')">BTS</button>
      <button class="suggestion-chip" onclick="quickSearch('Coldplay')">Coldplay</button>
      <button class="suggestion-chip" onclick="quickSearch('Dua Lipa')">Dua Lipa</button>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg" style="display:none"></div>

    <!-- Results -->
    <div id="results-area">
      <div class="status">
        <div class="status-icon">🎧</div>
        <p>Search for your favorite music above</p>
      </div>
    </div>

  </div>

  <script>
    let currentFilter = 'music';
    let currentAudio = null;
    let currentBtn   = null;

    function setFilter(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function quickSearch(term) {
      document.getElementById('search-input').value = term;
      doSearch();
    }

    async function doSearch() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;

      const btn = document.getElementById('search-btn');
      btn.disabled = true;
      btn.textContent = 'Searching…';

      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('results-area').innerHTML = `
        <div class="status">
          <div class="spinner"></div>
          <p>Finding great music…</p>
        </div>`;

      // Stop any playing audio
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }

      // iTunes Search API — CORS-friendly via allorigins proxy
      const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=${currentFilter}&limit=20&media=music`;

      try {
        // iTunes has CORS on .com but we use a reliable approach
        const res  = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          document.getElementById('results-area').innerHTML = `
            <div class="status">
              <div class="status-icon">🔍</div>
              <p>No results found for "<strong>${query}</strong>". Try a different search!</p>
            </div>`;
          return;
        }

        renderResults(data.results, query);
      } catch (err) {
        document.getElementById('error-msg').textContent = '⚠️ Could not fetch results. Check your internet connection and try again.';
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('results-area').innerHTML = `
          <div class="status">
            <div class="status-icon">😓</div>
            <p>Something went wrong. Please try again.</p>
          </div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Search 🎶';
      }
    }

    function renderResults(results, query) {
      const area = document.getElementById('results-area');

      area.innerHTML = `
        <div class="results-header">
          <div class="results-count">Found <span>${results.length}</span> results for "<span>${query}</span>"</div>
        </div>
        <div class="tracks-grid" id="tracks-grid"></div>`;

      const grid = document.getElementById('tracks-grid');

      results.forEach((item, i) => {
        const name     = item.trackName    || item.collectionName || item.artistName || 'Unknown';
        const artist   = item.artistName   || '';
        const album    = item.collectionName || '';
        const art      = (item.artworkUrl100 || '').replace('100x100', '300x300');
        const preview  = item.previewUrl   || null;
        const genre    = item.primaryGenreName || '';
        const link     = item.trackViewUrl || item.collectionViewUrl || item.artistViewUrl || '#';

        const card = document.createElement('div');
        card.className = 'track-card';
        card.style.animationDelay = `${i * 0.04}s`;

        card.innerHTML = `
          <div class="track-art-wrap">
            ${art ? `<img class="track-art" src="${art}" alt="${name}" loading="lazy" onerror="this.style.display='none'">` : '<div style="height:100%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:3rem;">🎵</div>'}
            <div class="art-overlay"></div>
            ${preview ? `
            <button class="play-btn" id="play-${i}" onclick="togglePreview('${preview}', 'play-${i}')">
              <svg class="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg class="stop-icon" width="18" height="18" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>` : ''}
          </div>
          <div class="track-body">
            <div class="track-name">${name}</div>
            <div class="track-artist">${artist}</div>
            ${album && album !== name ? `<div class="track-album">${album}</div>` : ''}
          </div>
          <div class="track-footer">
            ${genre ? `<span class="genre-tag">${genre}</span>` : '<span></span>'}
            <a href="${link}" target="_blank" rel="noopener" class="itunes-link">
              Open in iTunes
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>`;

        grid.appendChild(card);
      });
    }

    function togglePreview(url, btnId) {
      const btn = document.getElementById(btnId);

      if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        if (currentBtn) currentBtn.classList.remove('playing');
        if (currentBtn === btn) { currentAudio = null; currentBtn = null; return; }
      }

      currentAudio = new Audio(url);
      currentAudio.volume = 0.7;
      currentAudio.play();
      currentBtn = btn;
      btn.classList.add('playing');

      currentAudio.onended = () => {
        btn.classList.remove('playing');
        currentAudio = null;
        currentBtn   = null;
      };
    }
  </script>

</body>
</html>
