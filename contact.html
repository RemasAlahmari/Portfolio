      <div class="sidebar-section">

          <i class="fa-regular fa-envelope" style="margin-right:5px;color:var(--rose)"></i>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <section class="section-block">
        <h2 class="section-title">Contact</h2>
        <p style="font-size:0.9rem;color:var(--text-light);margin-top:0.75rem;margin-bottom:0.5rem;">
          Have a question or want to get in touch? Fill out the form below.
        </p>

        <!--
          ACTION: Go to https://webhook.site, copy your unique URL,
          and paste it in the action attribute below.
        -->
        <form
          class="contact-form"
          action="https://webhook.site/f0abb65f-15ba-4e23-b5ee-52505e07eea7"
          method="POST">

          <!-- Name -->
          <div class="form-group">
            <label for="name">Name <span class="required">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your full name"
              required />
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com" />
          </div>

          <!-- Message -->
          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea
              id="message"
              name="message"
              rows="10"
              placeholder="Write your message here..."
              required></textarea>
          </div>

          <!-- Message Type -->
          <div class="form-group">
            <label>Message Type</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="message_type" value="inquiry" checked />
                Inquiry
              </label>
              <label class="radio-label">
                <input type="radio" name="message_type" value="complaint" />
                Complaint
              </label>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit">Send Message</button>

        </form>
      </section>
